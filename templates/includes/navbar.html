{% load static %}
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard-home' %}">
            <img src="{% static 'images/logo.jpg' %}" alt="Kerish Motor Mall" class="rounded-1">
            <div class="d-none d-sm-block">
                <span class="text-white fw-bold" style="font-size: 0.95rem; letter-spacing: 0.02em;">Kerish Motor Mall</span>
                <span class="navbar-brand-subtitle">Charger Management System</span>
            </div>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                {% if user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-1"
                       href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span>{{ user.full_name }}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li>
                            <span class="dropdown-item-text text-muted small">
                                {{ user.get_role_display }}
                            </span>
                        </li>
                        <li><hr class="dropdown-divider my-1"></li>
                        <li>
                            <a class="dropdown-item" href="{% url 'logout' %}">
                                <i class="bi bi-box-arrow-right me-2 text-danger"></i>Logout
                            </a>
                        </li>
                    </ul>
                </li>
                {% endif %}
            </ul>
        </div>

    </div>
</nav>
